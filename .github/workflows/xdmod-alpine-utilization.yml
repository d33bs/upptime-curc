name: XDMoD Alpine Utilization
on:
  schedule:
    - cron: "45 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    name: Update Alpine utilization threshold status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Query CURC XDMoD
        run: node .github/scripts/check-xdmod-alpine-utilization.js
        env:
          NODE_OPTIONS: --use-system-ca
          XDMOD_ALPINE_UTILIZATION_THRESHOLD: "15"
      - name: Commit status update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update XDMoD Alpine utilization status"
          file_pattern: api/curc-xdmod-alpine-utilization-threshold/status.json
          commit_user_name: Upptime Bot
          commit_user_email: 73812536+upptime-bot@users.noreply.github.com
